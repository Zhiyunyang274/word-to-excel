<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Word 转 Excel 工具 - 免费在线转换</title>
    <meta name="description" content="免费在线将 Word 文档转换为 Excel 表格，支持 .docx 格式，无需注册，本地处理，安全快捷">
    <meta name="keywords" content="Word转Excel, docx转excel, 文档转换, 在线工具, 免费转换">
    <link rel="canonical" href="https://your-domain.com">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
            line-height: 1.5;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-area:hover, .upload-area:active {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .upload-hint {
            color: #999;
            font-size: 13px;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            color: #333;
            font-weight: 500;
            margin-bottom: 10px;
            word-break: break-all;
            font-size: 14px;
            line-height: 1.4;
        }

        .convert-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            -webkit-appearance: none;
        }

        .convert-btn:hover, .convert-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .convert-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            display: none;
            word-wrap: break-word;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.processing {
            background: #fff3cd;
            color: #856404;
        }

        .features {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .feature-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: #666;
            font-size: 13px;
            line-height: 1.5;
        }

        .feature-icon {
            margin-right: 8px;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* 移动端优化 */
        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
                border-radius: 15px;
            }

            h1 {
                font-size: 22px;
            }

            .subtitle {
                font-size: 13px;
            }

            .upload-area {
                padding: 40px 15px;
                min-height: 120px;
            }

            .upload-icon {
                font-size: 50px;
                margin-bottom: 10px;
            }

            .upload-text {
                font-size: 15px;
            }

            .upload-hint {
                font-size: 12px;
            }

            .convert-btn {
                padding: 14px;
                font-size: 15px;
            }

            .file-name {
                font-size: 13px;
            }

            .status {
                font-size: 13px;
            }

            .feature-item {
                font-size: 12px;
            }
        }

        /* 小屏手机优化 */
        @media (max-width: 360px) {
            .container {
                padding: 20px 12px;
            }

            h1 {
                font-size: 20px;
            }

            .upload-area {
                padding: 35px 12px;
            }

            .upload-icon {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Word 转 Excel</h1>
        <p class="subtitle">免费、安全、快速，无需注册<br>支持手机使用</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击选择 Word 文件</div>
            <div class="upload-hint">支持 .docx 格式<br>手机直接上传</div>
        </div>

        <input type="file" id="fileInput" accept=".docx">

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <button class="convert-btn" id="convertBtn">开始转换</button>
        </div>

        <div class="status" id="status"></div>

        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">✅</span>
                本地处理，文件不上传服务器
            </div>
            <div class="feature-item">
                <span class="feature-icon">✅</span>
                无需注册，直接使用
            </div>
            <div class="feature-item">
                <span class="feature-icon">✅</span>
                支持手机上传转换
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
